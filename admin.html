  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background-color: #fdf5f2;
      color: #1a1a2e;
      min-height: 100vh;
    }

    /* Grain texture */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.025;
    }

    h1, h2, h3, h4 { font-family: 'Playfair Display', Georgia, serif; }

    .bg-canvas {
      background:
        radial-gradient(ellipse 80% 60% at 10% 0%, rgba(193,123,110,0.10) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 90% 100%, rgba(26,40,112,0.07) 0%, transparent 60%),
        #fdf5f2;
    }

    /* Card base */
    .card {
      background: #fff;
      border-radius: 1rem;
      box-shadow:
        0 2px 8px rgba(26,40,112,0.06),
        0 0 0 1px rgba(26,40,112,0.04),
        0 8px 24px rgba(193,123,110,0.05);
    }

    /* Booking card */
    .booking-card {
      background: #fff;
      border-radius: 1rem;
      padding: 1.5rem;
      box-shadow:
        0 2px 8px rgba(26,40,112,0.06),
        0 0 0 1px rgba(26,40,112,0.04),
        0 8px 24px rgba(193,123,110,0.05);
      transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.22s ease;
      position: relative;
      overflow: hidden;
    }
    .booking-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 4px 16px rgba(26,40,112,0.09), 0 0 0 1px rgba(26,40,112,0.06), 0 16px 40px rgba(193,123,110,0.08);
    }

    /* Status bar on left edge */
    .booking-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 4px; height: 100%;
      border-radius: 1rem 0 0 1rem;
    }
    .booking-card.pending::before  { background: #f59e0b; }
    .booking-card.confirmed::before { background: #10b981; }
    .booking-card.rejected::before  { background: #ef4444; }
    .booking-card.booked::before    { background: #3b82f6; }

    /* Status badge */
    .status-badge {
      display: inline-flex; align-items: center; gap: 0.35rem;
      font-family: 'DM Sans', sans-serif; font-size: 0.7rem; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 0.28rem 0.7rem; border-radius: 9999px;
    }
    .status-badge.pending  { background: rgba(245,158,11,0.12); color: #b45309; }
    .status-badge.confirmed { background: rgba(16,185,129,0.12); color: #065f46; }
    .status-badge.rejected  { background: rgba(239,68,68,0.1);  color: #991b1b; }
    .status-badge.booked    { background: rgba(59,130,246,0.12); color: #1d4ed8; }

    /* Filter tabs */
    .filter-tab {
      font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 500;
      padding: 0.45rem 1.1rem; border-radius: 9999px;
      cursor: pointer; border: 1.5px solid transparent;
      transition: background 0.18s ease, border-color 0.18s ease, color 0.18s ease;
      color: #6b6b8a;
    }
    .filter-tab:hover { background: rgba(26,40,112,0.06); color: #1a2870; }
    .filter-tab.active {
      background: #1a2870; color: #fff;
      border-color: #1a2870;
      box-shadow: 0 4px 12px rgba(26,40,112,0.22);
    }
    .filter-tab:focus-visible { outline: 2px solid #1a2870; outline-offset: 3px; }

    /* Action buttons */
    .btn-confirm {
      display: inline-flex; align-items: center; gap: 0.4rem;
      background: #10b981; color: #fff;
      font-family: 'DM Sans', sans-serif; font-size: 0.8rem; font-weight: 600;
      padding: 0.5rem 1.1rem; border-radius: 0.5rem; border: none; cursor: pointer;
      box-shadow: 0 3px 10px rgba(16,185,129,0.3);
      transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s ease;
    }
    .btn-confirm:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(16,185,129,0.38); }
    .btn-confirm:active { transform: translateY(0); }
    .btn-confirm:focus-visible { outline: 2px solid #10b981; outline-offset: 3px; }

    .btn-reject {
      display: inline-flex; align-items: center; gap: 0.4rem;
      background: transparent; color: #ef4444;
      font-family: 'DM Sans', sans-serif; font-size: 0.8rem; font-weight: 600;
      padding: 0.5rem 1.1rem; border-radius: 0.5rem;
      border: 1.5px solid rgba(239,68,68,0.3); cursor: pointer;
      transition: background 0.18s ease, border-color 0.18s ease, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .btn-reject:hover { background: rgba(239,68,68,0.07); border-color: #ef4444; transform: translateY(-1px); }
    .btn-reject:active { transform: translateY(0); }
    .btn-reject:focus-visible { outline: 2px solid #ef4444; outline-offset: 3px; }

    .btn-whatsapp {
      display: inline-flex; align-items: center; gap: 0.4rem;
      background: #25d366; color: #fff;
      font-family: 'DM Sans', sans-serif; font-size: 0.8rem; font-weight: 600;
      padding: 0.5rem 1.1rem; border-radius: 0.5rem; border: none; cursor: pointer;
      text-decoration: none;
      box-shadow: 0 3px 10px rgba(37,211,102,0.3);
      transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s ease;
    }
    .btn-whatsapp:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(37,211,102,0.38); }
    .btn-whatsapp:active { transform: translateY(0); }
    .btn-whatsapp:focus-visible { outline: 2px solid #25d366; outline-offset: 3px; }

    /* Stat card */
    .stat-card {
      background: #fff; border-radius: 1rem; padding: 1.4rem 1.5rem;
      box-shadow: 0 2px 8px rgba(26,40,112,0.06), 0 0 0 1px rgba(26,40,112,0.04);
    }

    /* Search input */
    .search-input {
      width: 100%; padding: 0.65rem 1rem 0.65rem 2.75rem;
      border: 1.5px solid rgba(26,40,112,0.15); border-radius: 0.625rem;
      font-family: 'DM Sans', sans-serif; font-size: 0.88rem; color: #1a1a2e;
      background: #fff; outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }
    .search-input:focus {
      border-color: #1a2870;
      box-shadow: 0 0 0 3px rgba(26,40,112,0.08);
    }

    /* Pulse dot for live */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .live-dot { animation: pulse 2s ease-in-out infinite; }

    /* Empty state */
    .empty-state {
      text-align: center; padding: 4rem 2rem;
      color: #6b6b8a;
    }

    /* Confirm dialog overlay — opacity-driven, no display toggle */
    #confirm-dialog-overlay {
      position: fixed; inset: 0; z-index: 300;
      display: flex; align-items: center; justify-content: center; padding: 1.5rem;
      background: rgba(26,26,46,0);
      backdrop-filter: blur(0px); -webkit-backdrop-filter: blur(0px);
      opacity: 0; visibility: hidden; pointer-events: none;
      transition: opacity 0.22s ease, background 0.22s ease;
    }
    #confirm-dialog-overlay.open {
      opacity: 1; visibility: visible; pointer-events: auto;
      background: rgba(26,26,46,0.75);
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    }
    .dialog-card {
      background: #fff; border-radius: 1.25rem; padding: 2rem;
      width: 100%; max-width: 400px;
      box-shadow: 0 24px 64px rgba(26,26,46,0.3);
      transform: translateY(24px) scale(0.97);
      opacity: 0;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.22s ease;
    }
    #confirm-dialog-overlay.open .dialog-card {
      transform: translateY(0) scale(1);
      opacity: 1;
    }

    /* Card entrance */
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .booking-card { animation: cardIn 0.38s cubic-bezier(0.34,1.3,0.64,1) both; }

    /* Stat card entrance */
    @keyframes statIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .stat-card { animation: statIn 0.45s cubic-bezier(0.34,1.3,0.64,1) both; }

    /* Skeleton shimmer */
    @keyframes shimmer {
      from { background-position: -600px 0; }
      to   { background-position: 600px 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, rgba(26,40,112,0.06) 25%, rgba(26,40,112,0.1) 50%, rgba(26,40,112,0.06) 75%);
      background-size: 600px 100%;
      animation: shimmer 1.4s ease-in-out infinite;
      border-radius: 0.4rem;
    }
    .skeleton-card {
      background: #fff; border-radius: 1rem; padding: 1.5rem; padding-left: 1.75rem;
      box-shadow: 0 2px 8px rgba(26,40,112,0.06), 0 0 0 1px rgba(26,40,112,0.04);
      position: relative; overflow: hidden;
    }
    .skeleton-card::before {
      content: ''; position: absolute; top: 0; left: 0;
      width: 4px; height: 100%; border-radius: 1rem 0 0 1rem;
      background: rgba(26,40,112,0.08);
    }

    /* Grid fade transition */
    #bookings-grid {
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    /* Note textarea */
    .note-area {
      width: 100%; padding: 0.65rem 0.875rem;
      border: 1.5px solid rgba(26,40,112,0.15); border-radius: 0.5rem;
      font-family: 'DM Sans', sans-serif; font-size: 0.875rem; color: #1a1a2e;
      background: #fdf5f2; outline: none; resize: none;
      transition: border-color 0.18s ease;
    }
    .note-area:focus { border-color: #1a2870; }

    /* ── Mobile responsive ── */
    @media (max-width: 640px) {
      /* Header: auto-height, tighter padding, allow wrapping */
      #header-inner {
        height: auto !important;
        padding: 0.6rem 1rem !important;
        flex-wrap: wrap !important;
        gap: 0.4rem 0.75rem !important;
      }
      /* Hide date on small screens — saves horizontal space */
      #header-date { display: none !important; }
      /* Make right-side buttons slightly smaller */
      #wa-toggle { padding: 0.35rem 0.7rem !important; font-size: 0.72rem !important; }

      /* Stats: 2×2 grid */
      #stats-row { grid-template-columns: repeat(2, 1fr) !important; }

      /* Main: tighter padding */
      #main-content { padding: 1.25rem 0.875rem 4rem !important; }

      /* Bookings grid: single column on very small screens */
      #bookings-grid { grid-template-columns: 1fr !important; }

      /* Toolbar: stack search full width */
      #search-wrap { max-width: 100% !important; flex: 1 1 100% !important; }
    }
  </style>
</head>

<!-- ─── MAIN ─── -->
<main id="main-content" style="max-width:1200px;margin:0 auto;padding:2.5rem 2rem 5rem;position:relative;z-index:1;">

  <!-- Stats row -->
  <div id="stats-row" style="display:grid;grid-template-columns:repeat(4,1fr);gap:1.25rem;margin-bottom:2.5rem;">

    <div class="stat-card" style="animation-delay:0.05s;">
      <div style="font-family:'DM Sans',sans-serif;font-size:0.7rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#6b6b8a;margin-bottom:0.5rem;">Total Bookings</div>
      <div style="font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:#1a2870;" id="stat-total">0</div>
    </div>

    <div class="stat-card" style="animation-delay:0.1s;">
      <div style="font-family:'DM Sans',sans-serif;font-size:0.7rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#6b6b8a;margin-bottom:0.5rem;">Pending</div>
      <div style="font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:#b45309;" id="stat-pending">0</div>
    </div>

    <div class="stat-card" style="animation-delay:0.15s;">
      <div style="font-family:'DM Sans',sans-serif;font-size:0.7rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#6b6b8a;margin-bottom:0.5rem;">Confirmed</div>
      <div style="font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:#065f46;" id="stat-confirmed">0</div>
    </div>

    <div class="stat-card" style="animation-delay:0.2s;">
      <div style="font-family:'DM Sans',sans-serif;font-size:0.7rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#6b6b8a;margin-bottom:0.5rem;">Upcoming Today</div>
      <div style="font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:#c17b6e;" id="stat-today">0</div>
    </div>

  </div>

  <!-- Toolbar: search + filters -->
  <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap;margin-bottom:2rem;">

    <!-- Search -->
    <div id="search-wrap" style="position:relative;flex:1;min-width:220px;max-width:320px;">
      <svg style="position:absolute;left:0.85rem;top:50%;transform:translateY(-50%);pointer-events:none;" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#6b6b8a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="search-input" class="search-input" type="text" placeholder="Search by name or phone…" oninput="renderBookings()" />
    </div>

    <!-- Filter tabs -->
    <div style="display:flex;align-items:center;gap:0.4rem;flex-wrap:wrap;">
      <button class="filter-tab active" data-filter="all"       onclick="setFilter('all')">All</button>
      <button class="filter-tab"        data-filter="pending"   onclick="setFilter('pending')">Pending</button>
      <button class="filter-tab"        data-filter="confirmed" onclick="setFilter('confirmed')">Confirmed</button>
      <button class="filter-tab"        data-filter="rejected"  onclick="setFilter('rejected')">Rejected</button>
    </div>

    <!-- Right: sort + clear old -->

      <select id="sort-select" onchange="renderBookings()"

        <option value="oldest">Oldest first</option>

  async function setupPushNotifications() {
    if (!('serviceWorker' in navigator) || !('Notification' in window)) return;

    try {
      const permission = await Notification.requestPermission();
      if (permission !== 'granted') {
        console.log('Notification permission denied.');
        return;
      }

      const reg = await navigator.serviceWorker.ready;
      const messaging = firebase.messaging();

      // Get FCM token, passing our existing service worker registration
      const token = await messaging.getToken({
        vapidKey: FCM_VAPID_KEY,
        serviceWorkerRegistration: reg,
      });

      if (!token) {
        console.warn('FCM: no token returned — check VAPID key and Firebase config.');
        return;
      }

      // Save token to Supabase via server API (uses service role key)
      await fetch('/api/save-fcm-token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token }),
      });

      // Show notifications when admin page is in the foreground
      // Must use registration.showNotification() — new Notification() is blocked on Android
      messaging.onMessage(payload => {
        const n     = payload.notification || {};
        const d     = payload.data         || {};
        const title = n.title || d.title   || 'New Booking';
        const body  = n.body  || d.body    || '';

            data: { url },

        }
      });

      // Auto-refresh token whenever Firebase rotates it
      messaging.onTokenRefresh(async () => {
        try {
          const newToken = await messaging.getToken({
            vapidKey: FCM_VAPID_KEY,
            serviceWorkerRegistration: reg,
          });
          if (newToken) {

              headers: { 'Content-Type': 'application/json' },

            });
            console.log('FCM token refreshed and saved.');
          }
        } catch (err) {
          console.warn('FCM token refresh failed:', err);
        }
      });

      console.log('FCM push notifications enabled.');

  // ── Date helpers ───────────────────────────────────────────────────────────
  function formatDate(dateStr) {
    if (!dateStr) return '';
    const [y, m, d] = dateStr.split('-').map(Number);
    return new Date(y, m - 1, d).toLocaleDateString('en-IN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  }
  function formatRelative(isoStr) {
    const d = new Date(isoStr);
    const now = new Date();
    const diffMs = now - d;
    const diffMin = Math.floor(diffMs / 60000);
    const diffHr  = Math.floor(diffMs / 3600000);
    const diffDay = Math.floor(diffMs / 86400000);
    if (diffMin < 1)   return 'Just now';
    if (diffMin < 60)  return `${diffMin}m ago`;
    if (diffHr  < 24)  return `${diffHr}h ago`;
    if (diffDay === 1) return 'Yesterday';
    return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
  }
  function todayStr() {

  function animateCount(el, target) {
    const start = parseInt(el.textContent) || 0;
    if (start === target) return;
    const duration = 500;
    const startTime = performance.now();
    function tick(now) {
      const t = Math.min((now - startTime) / duration, 1);
      const eased = 1 - Math.pow(1 - t, 3);
      el.textContent = Math.round(start + (target - start) * eased);
      if (t < 1) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }

            Notified via WhatsApp
          </span>
          <button onclick="deleteBooking('${b.id}')" style="display:inline-flex;align-items:center;gap:0.35rem;font-family:'DM Sans',sans-serif;font-size:0.78rem;font-weight:500;color:#6b6b8a;background:transparent;border:1.5px solid rgba(26,40,112,0.12);border-radius:0.5rem;padding:0.45rem 0.75rem;cursor:pointer;transition:color 0.18s ease,border-color 0.18s ease;" onmouseover="this.style.color='#ef4444';this.style.borderColor='rgba(239,68,68,0.35)'" onmouseout="this.style.color='#6b6b8a';this.style.borderColor='rgba(26,40,112,0.12)'">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
            Delete
          </button>
        </div>`
      : `<div style="display:flex;align-items:center;gap:0.6rem;">
          <span style="font-family:'DM Sans',sans-serif;font-size:0.78rem;color:#6b6b8a;font-style:italic;">Booking declined</span>
          <button onclick="deleteBooking('${b.id}')" style="display:inline-flex;align-items:center;gap:0.35rem;font-family:'DM Sans',sans-serif;font-size:0.78rem;font-weight:500;color:#6b6b8a;background:transparent;border:1.5px solid rgba(26,40,112,0.12);border-radius:0.5rem;padding:0.45rem 0.75rem;cursor:pointer;transition:color 0.18s ease,border-color 0.18s ease;" onmouseover="this.style.color='#ef4444';this.style.borderColor='rgba(239,68,68,0.35)'" onmouseout="this.style.color='#6b6b8a';this.style.borderColor='rgba(26,40,112,0.12)'">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
            Delete
          </button>
        </div>`;

    return `
      <div class="booking-card ${b.status}" style="padding-left:1.75rem;animation-delay:${staggerDelay}s;">
        <!-- Status + time submitted -->
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">
          <span class="status-badge ${b.status}">
            <span style="width:5px;height:5px;border-radius:50%;background:currentColor;display:inline-block;"></span>
            ${statusDot.label}
          </span>
          <span style="font-family:'DM Sans',sans-serif;font-size:0.72rem;color:#6b6b8a;">${formatRelative(b.submittedAt)}</span>
        </div>

        <!-- Patient name -->
        <h3 style="font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:700;color:#1a1a2e;letter-spacing:-0.02em;margin-bottom:0.25rem;">${escHtml(b.name)}</h3>

        <!-- Phone -->
        <a href="tel:${escHtml(b.phone)}" style="display:inline-flex;align-items:center;gap:0.4rem;font-family:'DM Sans',sans-serif;font-size:0.82rem;color:#1a2870;text-decoration:none;margin-bottom:1rem;transition:opacity 0.15s ease;" onmouseover="this.style.opacity='0.7'" onmouseout="this.style.opacity='1'">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.41 2 2 0 0 1 3.6 1.24h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.18 6.18l1.73-1.73a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          ${escHtml(b.phone)}
        </a>

        <!-- Date + time chips -->
        <div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1.25rem;">
          <span style="display:inline-flex;align-items:center;gap:0.35rem;background:rgba(26,40,112,0.07);color:#1a2870;font-family:'DM Sans',sans-serif;font-size:0.75rem;font-weight:500;padding:0.3rem 0.75rem;border-radius:9999px;">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            ${escHtml(b.formattedDate || b.date)}
          </span>
          <span style="display:inline-flex;align-items:center;gap:0.35rem;background:rgba(193,123,110,0.1);color:#9a5c51;font-family:'DM Sans',sans-serif;font-size:0.75rem;font-weight:500;padding:0.3rem 0.75rem;border-radius:9999px;">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            ${escHtml(b.time)}
          </span>
          ${b.type === 'offline'
            ? `<span style="display:inline-flex;align-items:center;gap:0.35rem;background:rgba(16,185,129,0.1);color:#065f46;font-family:'DM Sans',sans-serif;font-size:0.75rem;font-weight:500;padding:0.3rem 0.75rem;border-radius:9999px;">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                In-Person
              </span>`
            : `<span style="display:inline-flex;align-items:center;gap:0.35rem;background:rgba(26,40,112,0.07);color:#1a2870;font-family:'DM Sans',sans-serif;font-size:0.75rem;font-weight:500;padding:0.3rem 0.75rem;border-radius:9999px;">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                Online
              </span>`
          }
        </div>

        <!-- Divider -->
        <div style="height:1px;background:rgba(26,40,112,0.06);margin-bottom:1.1rem;"></div>

        <!-- Actions -->
        ${actionButtons}
      </div>
    `;
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── Dialog ─────────────────────────────────────────────────────────────────
  async function openConfirmDialog(id) {
    const b = (await getBookings()).find(x => String(x.id) === String(id));
    if (!b) return;
    pendingAction = { type: 'confirm', id, booking: b };

    // Set dialog to confirm mode
    document.getElementById('dialog-icon').style.background = 'rgba(16,185,129,0.1)';
    document.getElementById('dialog-icon').innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2.2" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>`;
    document.getElementById('dialog-title').textContent = 'Confirm Booking';
    document.getElementById('dialog-sub').textContent = 'This will mark the appointment as confirmed.';
    document.getElementById('dialog-confirm-btn').style.background = '#10b981';
    document.getElementById('dialog-confirm-btn').style.boxShadow = '0 3px 10px rgba(16,185,129,0.3)';
    document.getElementById('dialog-confirm-btn').textContent = 'Confirm Appointment';
    document.getElementById('dialog-note-wrap').style.display = '';
    document.getElementById('dialog-note').value = '';

    // Preview
    document.getElementById('dialog-booking-preview').innerHTML = `
      <div style="font-family:'DM Sans',sans-serif;">
        <div style="font-size:0.95rem;font-weight:600;color:#1a1a2e;margin-bottom:0.3rem;">${escHtml(b.name)}</div>
        <div style="font-size:0.8rem;color:#6b6b8a;">${escHtml(b.phone)}</div>
        <div style="margin-top:0.5rem;display:flex;gap:0.5rem;flex-wrap:wrap;">
          <span style="font-size:0.78rem;font-weight:500;color:#1a2870;">${escHtml(b.formattedDate || b.date)}</span>
          <span style="color:#6b6b8a;">·</span>
          <span style="font-size:0.78rem;font-weight:500;color:#c17b6e;">${escHtml(b.time)}</span>
        </div>
      </div>
    `;

    document.getElementById('confirm-dialog-overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  async function openRejectDialog(id) {
    const b = (await getBookings()).find(x => String(x.id) === String(id));
    if (!b) return;
    pendingAction = { type: 'reject', id, booking: b };

    // Set dialog to reject mode
    document.getElementById('dialog-icon').style.background = 'rgba(239,68,68,0.1)';
    document.getElementById('dialog-icon').innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2.2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
    document.getElementById('dialog-title').textContent = 'Reject Booking';
    document.getElementById('dialog-sub').textContent = 'This will mark the appointment as rejected.';
    document.getElementById('dialog-confirm-btn').style.background = '#ef4444';
    document.getElementById('dialog-confirm-btn').style.boxShadow = '0 3px 10px rgba(239,68,68,0.3)';
    document.getElementById('dialog-confirm-btn').textContent = 'Reject Booking';
    document.getElementById('dialog-note-wrap').style.display = 'none';

    // Preview
    document.getElementById('dialog-booking-preview').innerHTML = `
      <div style="font-family:'DM Sans',sans-serif;">
        <div style="font-size:0.95rem;font-weight:600;color:#1a1a2e;margin-bottom:0.3rem;">${escHtml(b.name)}</div>
        <div style="font-size:0.8rem;color:#6b6b8a;">${escHtml(b.phone)}</div>
        <div style="margin-top:0.5rem;display:flex;gap:0.5rem;flex-wrap:wrap;">
          <span style="font-size:0.78rem;font-weight:500;color:#1a2870;">${escHtml(b.formattedDate || b.date)}</span>
          <span style="color:#6b6b8a;">·</span>
          <span style="font-size:0.78rem;font-weight:500;color:#c17b6e;">${escHtml(b.time)}</span>
        </div>
      </div>
    `;

    document.getElementById('confirm-dialog-overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeDialog() {
    document.getElementById('confirm-dialog-overlay').classList.remove('open');
    document.body.style.overflow = '';
    pendingAction = null;
  }

  function handleDialogOverlayClick(e) {
    if (e.target === document.getElementById('confirm-dialog-overlay')) closeDialog();
  }

  // The confirm button is an <a> tag. For confirm: we set its href to the WA URL
  // and let the browser navigate naturally (real anchor tap = reliable on Android).
  // For reject: we prevent navigation and handle it in JS.
  function executeDialogAction(e, anchor) {
    if (!pendingAction) { e.preventDefault(); return false; }
    const { type, id, booking } = pendingAction;

    if (type === 'confirm' && booking) {
      // Build WA message including optional note
      const note = (document.getElementById('dialog-note')?.value || '').trim();
      const phoneClean = booking.phone.replace(/\D/g, '');
      const waPhone = phoneClean.startsWith('91') ? phoneClean : '91' + phoneClean;
      const consultType = booking.type === 'offline' ? 'in-person' : 'online';
      const noteLine = note ? `\n\n📝 ${note}` : '';
      const msg = encodeURIComponent(
        `Hi ${booking.name}, your *${consultType} consultation* with Dr. Monisha S is *confirmed* for *${booking.formattedDate}* at *${booking.time}*.` +
        `\n\nPlease be available 5 minutes before your appointment.` +
        noteLine +
        `\n\n— Dr. Monisha S Clinic`
      );
      const href = buildWaHref(waPhone, msg);
      closeDialog();
      soundConfirm();
      updateBookingStatus(id, 'booked').then(() => renderBookings());
      window.open(href, '_blank');
      return false;

    } else {
      e.preventDefault(); // reject has href="#", block navigation
      closeDialog();
      soundReject();
      updateBookingStatus(id, 'rejected').then(() => renderBookings());
      return false;
    }
  }

  // ── Delete single booking ──────────────────────────────────────────────────
  async function deleteBooking(id) {
    if (!confirm('Delete this booking permanently?')) return;
    const res = await fetch('/api/update-booking', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'delete', id }),
    });
    if (res.ok) {
      soundDelete();
      showToast('Booking deleted', 'reject');
      renderBookings();
    } else {
      showToast('Delete failed', 'error');
    }
  }

  // ── Clear rejected ─────────────────────────────────────────────────────────
  async function clearRejected() {
    const res = await fetch('/api/update-booking', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'clear-rejected' }),
    });
    if (res.ok) {
      showToast('Rejected bookings cleared', 'success');
    } else {
      showToast('Failed to clear rejected bookings', 'error');
    }
    renderBookings();
  }

  // ── Init ───────────────────────────────────────────────────────────────────
  function initHeader() {
    const now = new Date();
    document.getElementById('header-date').textContent = now.toLocaleDateString('en-IN', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });
  }

  // Real-time updates — fires whenever a booking is inserted/updated/deleted
  db.channel('bookings-changes')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'bookings' }, () => {
      soundNotify();
      renderBookings();
    })
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'bookings' }, () => {
      renderBookings();
    })
    .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'bookings' }, () => {
      renderBookings();
    })
    .subscribe();

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeDialog();
  });

  initHeader();
  updateWaToggleLabel();
  renderBookings();
  setupPushNotifications();
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('SW registered:', reg.scope))
        .catch(err => console.warn('SW registration failed:', err));
    });
  }
</script>

</body>
</html>
