<!-- Sign In - Carty -->
<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Manrope:wght@300;400;500;600&amp;family=Inter:wght@300;400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-secondary": "#ffffff",
              "surface-dim": "#d7dbdb",
              "on-secondary-fixed": "#2c1600",
              "tertiary-fixed-dim": "#ffb3b4",
              "on-surface": "#181c1d",
              "surface-container-low": "#f1f4f4",
              "surface-container-highest": "#e0e3e3",
              "on-background": "#181c1d",
              "on-tertiary": "#ffffff",
              "outline-variant": "#c5c6cb",
              "inverse-surface": "#2d3131",
              "primary-fixed": "#dde3ee",
              "on-primary-fixed-variant": "#414750",
              "inverse-primary": "#c1c7d2",
              "tertiary-container": "#40000b",
              "secondary-container": "#fe9800",
              "tertiary": "#000000",
              "surface-container-lowest": "#ffffff",
              "on-tertiary-fixed": "#40000b",
              "error-container": "#ffdad6",
              "surface-container-high": "#e6e9e9",
              "surface": "#f7fafa",
              "outline": "#75777c",
              "on-tertiary-fixed-variant": "#920025",
              "primary-fixed-dim": "#c1c7d2",
              "secondary-fixed": "#ffdcbd",
              "surface-container": "#ebeeee",
              "secondary": "#8a5100",
              "on-error": "#ffffff",
              "tertiary-fixed": "#ffdada",
              "on-secondary-fixed-variant": "#693c00",
              "on-secondary-container": "#643900",
              "on-primary": "#ffffff",
              "on-error-container": "#93000a",
              "on-primary-container": "#7e848e",
              "on-primary-fixed": "#161c24",
              "surface-variant": "#e0e3e3",
              "primary-container": "#161c24",
              "on-tertiary-container": "#f73653",
              "on-surface-variant": "#45474b",
              "background": "#f7fafa",
              "surface-tint": "#595f68",
              "primary": "#000000",
              "inverse-on-surface": "#eef1f1",
              "surface-bright": "#f7fafa",
              "secondary-fixed-dim": "#ffb86f",
              "error": "#ba1a1a"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Manrope"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
        .tonal-gradient {
            background: linear-gradient(180deg, #f7fafa 0%, #ebeeee 100%);
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen selection:bg-secondary-container selection:text-on-secondary-container">
<!-- Navigation Suppressed for Login Focus -->
<main class="relative min-h-screen flex items-center justify-center px-6 py-20 overflow-hidden">
<!-- Background Atmosphere -->
<div class="absolute inset-0 z-0">
<div class="absolute inset-0 bg-gradient-to-tr from-surface via-surface-container-low to-surface-bright opacity-80"></div>
<div class="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] bg-secondary-container/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-5%] left-[-5%] w-[400px] h-[400px] bg-primary-fixed/30 rounded-full blur-[100px]"></div>
<!-- Subtle Faded Lifestyle Image -->
<img class="absolute inset-0 object-cover w-full h-full opacity-10 grayscale mix-blend-multiply" data-alt="Blurred high-end luxury retail gallery interior" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAxpm0oGdcQHG_fppFZA5f9lEWPuA6R3dGrBzMbD_SnmEtsX9ac8f7IJLCHK7E4coYw9pxHi_SBMC3SGNzXNBstz14glM5w-wWI3zXTZOqjzGp7wYFJhcYHr0qkbY3j64BkDIGL9ypaO8xoEruCWPx7jOZaVo2Y_c_OKDuwOvajSP3n_5O3Iv8TuUO_5xBlX12ZbOLYfMLZrsntjl4acvgcKjbK2bvLWhfI5TKb9cSTHUk0UCpEbrMLIyNqNm4oLEKn9vsV9WrDDwU"/>
</div>
<!-- Auth Container -->
<div class="relative z-10 w-full max-w-[480px]">
<!-- Logo / Brand Anchor -->
<div class="text-center mb-16">
<h1 class="font-headline text-3xl font-extrabold tracking-tighter text-primary mb-2">Carty</h1>
<p class="font-label text-[0.6875rem] uppercase tracking-[0.25em] text-on-surface-variant/70">The Digital Curator</p>
</div>
<!-- Login Form Card -->
<div class="glass-card p-10 md:p-14 rounded-xl shadow-[0_20px_50px_rgba(24,28,29,0.05)] border border-white/40">
<div class="mb-10 text-center">
<h2 class="font-headline text-2xl font-bold tracking-tight text-primary mb-3">Inner Circle</h2>
<p class="text-on-surface-variant font-medium text-sm">Welcome back to the gallery.</p>
</div>
<form class="space-y-8">
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label text-[0.6875rem] uppercase tracking-widest text-on-surface-variant ml-1" for="email">Email Address</label>
<div class="relative group">
<input class="w-full bg-surface-container-low border-none focus:ring-1 focus:ring-primary/20 rounded-lg px-5 py-4 text-sm font-medium transition-colors duration-300 placeholder:text-outline-variant focus:bg-surface-container-lowest outline-none" id="email" placeholder="curator@carty.com" type="email"/>
<div class="absolute bottom-0 left-0 h-[1px] w-0 bg-primary transition-[width] duration-500 group-focus-within:w-full opacity-30"></div>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="font-label text-[0.6875rem] uppercase tracking-widest text-on-surface-variant" for="password">Password</label>
<a class="font-label text-[0.625rem] uppercase tracking-widest text-secondary hover:text-on-secondary-container transition-colors duration-300" href="#" onclick="event.preventDefault();if(typeof showToast==='function')showToast('Password reset link sent to your email')">Forgot Password?</a>
</div>
<div class="relative group">
<input class="w-full bg-surface-container-low border-none focus:ring-1 focus:ring-primary/20 rounded-lg px-5 py-4 text-sm font-medium transition-colors duration-300 placeholder:text-outline-variant focus:bg-surface-container-lowest outline-none" id="password" placeholder="••••••••" type="password"/>
<div class="absolute bottom-0 left-0 h-[1px] w-0 bg-primary transition-[width] duration-500 group-focus-within:w-full opacity-30"></div>
</div>
</div>
<!-- CTA Button -->
<div class="pt-4">
<a href="carty-profile.html" class="w-full bg-primary hover:bg-neutral-800 text-on-primary font-headline font-bold py-5 rounded-lg shadow-xl shadow-black/10 transition-colors duration-300 transform active:scale-[0.98] group flex items-center justify-center gap-3 block text-center">
<span>Sign In</span>
<span class="material-symbols-outlined text-secondary-container text-lg">arrow_forward</span>
</a>
</div>
</form>
<!-- Alternative Action -->
<div class="mt-12 text-center">
<div class="flex items-center gap-4 mb-8">
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
<span class="font-label text-[0.625rem] text-outline uppercase tracking-widest">New Arrival?</span>
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
</div>
<a class="inline-flex items-center gap-2 group" href="carty-signup.html">
<span class="font-headline text-sm font-bold text-primary group-hover:text-secondary transition-colors duration-300">Join the Inner Circle</span>
<span class="h-[1px] w-8 bg-secondary transition-[width] duration-300 group-hover:w-12"></span>
</a>
</div>
</div>
<!-- Footer / Legal -->
<div class="mt-12 flex justify-center gap-8">
<a class="font-label text-[0.625rem] uppercase tracking-[0.2em] text-on-surface-variant/50 hover:text-primary transition-colors duration-300" href="#">Privacy Policy</a>
<a class="font-label text-[0.625rem] uppercase tracking-[0.2em] text-on-surface-variant/50 hover:text-primary transition-colors duration-300" href="#">Terms of Service</a>
</div>
</div>
</main>
<script src="carty-cart.js"></script>
<!-- Visual Embellishment: Curated Elements -->
<div class="fixed top-20 left-20 pointer-events-none opacity-20 hidden xl:block">
<div class="w-px h-64 bg-primary/20"></div>
<div class="font-label text-[0.625rem] vertical-rl rotate-180 uppercase tracking-widest mt-4 text-primary">Exhibition No. 04</div>
</div>
<div class="fixed bottom-20 right-20 pointer-events-none opacity-20 hidden xl:block text-right">
<div class="font-label text-[0.625rem] uppercase tracking-widest mb-4 text-primary">Carty Digital Gallery</div>
<div class="w-px h-64 bg-primary/20 ml-auto"></div>
</div>
</body></html>
